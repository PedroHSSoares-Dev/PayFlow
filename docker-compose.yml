services:

  # ============================================================
  # Container 2 — Banco de dados PostgreSQL
  # ============================================================
  db:
    image: postgres:15-alpine
    container_name: payflow-db
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - payflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ============================================================
  # Container 1 — Frontend React (build multi-stage + nginx)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_DB_HOST:   ${VITE_DB_HOST}
        VITE_APP_ENV:   ${VITE_APP_ENV}
        VITE_APP_TITLE: ${VITE_APP_TITLE}
    container_name: payflow-frontend
    ports:
      - "80:80"
    networks:
      - payflow-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

# ============================================================
# Rede customizada
# ============================================================
networks:
  payflow-network:
    driver: bridge
    name: payflow-network

# ============================================================
# Volume nomeado para persistência do PostgreSQL
# ============================================================
volumes:
  postgres_data:
    name: payflow_postgres_data
